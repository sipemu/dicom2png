name: Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: dicom2png-linux-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: dicom2png-macos-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: dicom2png-windows-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/dicom2png ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/dicom2png.exe ${{ matrix.artifact }}.exe

      - name: Upload release asset (Unix)
        if: runner.os != 'Windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.event.release.tag_name }} ${{ matrix.artifact }}

      - name: Upload release asset (Windows)
        if: runner.os == 'Windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.event.release.tag_name }} ${{ matrix.artifact }}.exe
